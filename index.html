<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Me · Yifu Luo</title>
    <style>
        /* 全局重置 & 优雅字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f9fafb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            /* 柔光渐变背景，提升质感 */
            background: radial-gradient(circle at 20% 30%, #ffffff, #f0f2f5);
        }

        .card {
            max-width: 720px;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 2.5rem;
            padding: 3.5rem 2.8rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08),
                0 8px 24px -6px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.6);
            text-align: center;
            transition: all 0.2s ease;
        }

        /* 核心文案 —— 完全符合需求 */
        .hero-text {
            font-size: 2.6rem;
            font-weight: 350;
            letter-spacing: -0.02em;
            line-height: 1.4;
            color: #0b1120;
            margin-bottom: 1.5rem;
            word-break: break-word;
        }

        /* 邮箱高亮显示 (美观且可复制) */
        .email-wrapper {
            display: inline-block;
            margin-top: 0.25rem;
            padding: 0.5rem 1.8rem;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 60px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: background 0.2s;
        }

        .email-wrapper:hover {
            background: rgba(0, 0, 0, 0.04);
        }

        .email-link {
            font-size: 1.5rem;
            font-weight: 400;
            color: #1e293b;
            text-decoration: none;
            border-bottom: 1px dashed rgba(30, 41, 59, 0.2);
            padding-bottom: 2px;
            transition: border-color 0.2s, color 0.2s;
        }

        .email-link:hover {
            color: #0f172a;
            border-bottom-color: #0f172a;
        }

        /* 极简装饰分隔 —— 让页面有呼吸感 */
        .divider {
            width: 48px;
            height: 2px;
            margin: 1.8rem auto 1.2rem;
            background: linear-gradient(to right, #d1d5db, #9ca3af);
            border-radius: 4px;
            opacity: 0.5;
        }

        /* 页脚小提示 (保留，但完全不干扰主文案) */
        .footnote {
            font-size: 0.85rem;
            color: #6b7280;
            letter-spacing: 0.01em;
            margin-top: 1.2rem;
            font-weight: 350;
        }

        /* 响应式：小屏设备调整字号与间距 */
        @media (max-width: 480px) {
            .card {
                padding: 2.5rem 1.5rem;
                border-radius: 2rem;
            }

            .hero-text {
                font-size: 1.9rem;
            }

            .email-link {
                font-size: 1.2rem;
            }

            .email-wrapper {
                padding: 0.4rem 1.2rem;
            }
        }

        @media (max-width: 380px) {
            .hero-text {
                font-size: 1.5rem;
            }

            .email-link {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <main class="card">

        <!-- 唯一核心文案：完全按照需求 -->
        <p class="hero-text">
            You can contact me via my email
        </p>

        <!-- 邮箱入口 (美观且可点击) -->
        <div class="email-wrapper">
            <a href="mailto:luoyf23@mails.tsinghua.edu.cn" class="email-link">
                luoyf23@mails.tsinghua.edu.cn
            </a>
        </div>

        <!-- 极简装饰线，仅为视觉层次 (不影响内容) -->
        <div class="divider" aria-hidden="true"></div>

        <!-- 优雅脚注，保留但不喧宾夺主 -->
        <p class="footnote">
            ✦ Very happy to chat! ✦
        </p>

    </main>

</body>
</html>
